# docker-compose.yml (na pasta raiz do projeto)
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-db
    environment:
      POSTGRES_USER: financeuser
      POSTGRES_PASSWORD: financepass123
      POSTGRES_DB: financeapp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - finance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeuser -d financeapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: finance-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=financeapp;Username=financeuser;Password=financepass123
      - Jwt__Key=YourSuperSecretKeyForJWTTokenGenerationMinimum32Characters
      - Jwt__Issuer=FinanceApp
      - Jwt__Audience=FinanceAppUsers
    ports:
      - "5000:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finance-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local

networks:
  finance-network:
    driver: bridge
